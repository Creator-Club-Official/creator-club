<!-- NEW POST MODAL -->
<div class="modal-overlay hidden" id="post-modal">
  <div class="modal" style="max-width:580px">
    <div class="modal-title">New Post</div>
    <div class="grid-2">
      <div class="form-group">
        <label>Post Type</label>
        <select id="post-type" onchange="handleTypeChange()">
          <option value="announcement">📢 Announcement</option>
          <option value="model">🧩 Exclusive Model</option>
          <option value="prerelease">🔒 Pre-Release Model</option>
          <option value="poll">📊 Poll</option>
        </select>
      </div>
      <div class="form-group">
        <label>Visible To</label>
        <select id="post-status">
          <option value="3">Everyone (Followers & Boosters)</option>
          <option value="1">Followers Only</option>
          <option value="2">Boosters Only</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="post-title" placeholder="Post title..."/>
    </div>
    <div class="form-group" id="body-group">
      <label>Body</label>
      <textarea id="post-body" placeholder="Write something for your members..."></textarea>
    </div>
    <div class="form-group hidden" id="model-url-group">
      <label>Model Download Link</label>
      <input type="text" id="post-model-url" placeholder="https://..."/>
    </div>
    <div class="hidden" id="poll-options-group">
      <div class="form-group">
        <label>Poll Options</label>
        <div id="poll-options">
          <input type="text" class="poll-opt-input mb-2" placeholder="Option 1"/>
          <input type="text" class="poll-opt-input mb-2" placeholder="Option 2"/>
        </div>
        <button class="btn btn-secondary btn-sm mt-1" onclick="addPollOption()">+ Add Option</button>
      </div>
    </div>
    <div class="form-group">
      <label>Schedule <span class="text-muted">(leave blank to publish immediately)</span></label>
      <input type="datetime-local" id="post-schedule"/>
    </div>
    <div id="post-alert" class="alert alert-error hidden"></div>
    <div class="flex gap-2 mt-4">
      <button class="btn btn-secondary" onclick="closePostModal()">Cancel</button>
      <button class="btn btn-primary" id="post-btn" onclick="createPost()" style="flex:1">Publish</button>
    </div>
  </div>
</div>

<script>
let currentUser, myClub, allPosts = [];

async function init() {
  await Auth.requireAuth();
  currentUser = await Auth.getUser();
  const profile = await Auth.getProfile(currentUser.id);
  const u = profile?.makerworld_username || currentUser.email.split('@')[0];
  document.getElementById('sidebar-username').textContent = u;
  document.getElementById('sidebar-avatar').textContent   = u[0].toUpperCase();

  myClub = await Clubs.getMyClub(currentUser.id);
  if (!myClub) {
    document.getElementById('no-club-msg').classList.remove('hidden');
    document.getElementById('new-post-btn').disabled = true;
    return;
  }
  document.getElementById('posts-section').classList.remove('hidden');
  loadPosts();
}

async function loadPosts() {
  allPosts = await Posts.listAllForCreator(myClub.id);
  renderPosts(allPosts);
}

function renderPosts(posts) {
  const el = document.getElementById('posts-list');
  if (!posts.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📝</div><h3>No posts yet</h3><p>Create your first post to share with members.</p></div>';
    return;
  }
  el.innerHTML = posts.map(p => `
    <div class="post-card">
      <div class="post-header">
        <div>
          <div class="post-type">${UI.postTypeIcon(p.type)} ${p.type.toUpperCase()}</div>
          <div class="post-title">${p.title}</div>
        </div>
        <div class="flex gap-2 items-center" style="flex-shrink:0">
          ${UI.statusBadge(p.target_status)}
          <span class="badge ${p.is_published ? 'badge-success' : 'badge-danger'}">${p.is_published ? 'Live' : 'Scheduled'}</span>
        </div>
      </div>
      ${p.body ? `<div class="post-body">${p.body}</div>` : ''}
      ${p.model_url ? `<div class="text-sm mt-1">🔗 <a href="${p.model_url}" target="_blank" style="color:var(--accent)">${p.model_url}</a></div>` : ''}
      <div class="post-footer">
        <span>${p.scheduled_at && !p.is_published ? '📅 ' + UI.formatDate(p.scheduled_at) : UI.formatDate(p.created_at)}</span>
        ${p.is_published ? `<button class="btn btn-danger btn-sm" onclick="archivePost('${p.id}')">Archive</button>` : ''}
      </div>
    </div>`).join('');
}

function filterPosts(type, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPosts(type === 'all' ? allPosts : allPosts.filter(p => p.type === type));
}

function openPostModal()  { document.getElementById('post-modal').classList.remove('hidden'); }
function closePostModal() {
  document.getElementById('post-modal').classList.add('hidden');
  document.getElementById('post-alert').classList.add('hidden');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closePostModal(); });

function handleTypeChange() {
  const type = document.getElementById('post-type').value;
  document.getElementById('model-url-group').classList.toggle('hidden', !['model','prerelease'].includes(type));
  document.getElementById('poll-options-group').classList.toggle('hidden', type !== 'poll');
}

function addPollOption() {
  const n   = document.querySelectorAll('.poll-opt-input').length + 1;
  const inp = document.createElement('input');
  inp.type = 'text'; inp.className = 'poll-opt-input mb-2'; inp.placeholder = 'Option ' + n;
  document.getElementById('poll-options').appendChild(inp);
}

async function createPost() {
  const btn     = document.getElementById('post-btn');
  const alertEl = document.getElementById('post-alert');
  alertEl.classList.add('hidden');

  const type     = document.getElementById('post-type').value;
  const status   = parseInt(document.getElementById('post-status').value);
  const title    = document.getElementById('post-title').value.trim();
  const body     = document.getElementById('post-body').value.trim();
  const modelUrl = document.getElementById('post-model-url').value.trim() || null;
  const schedStr = document.getElementById('post-schedule').value;
  const scheduled = schedStr ? new Date(schedStr).toISOString() : null;

  if (!title) { alertEl.textContent = 'Title is required.'; alertEl.classList.remove('hidden'); return; }

  if (type === 'poll') {
    const opts = [...document.querySelectorAll('.poll-opt-input')].map(i => i.value.trim()).filter(Boolean);
    if (opts.length < 2) { alertEl.textContent = 'Add at least 2 poll options.'; alertEl.classList.remove('hidden'); return; }
  }

  UI.setLoading(btn, true);
  try {
    const post = await Posts.create(myClub.id, type, title, body, status, scheduled, modelUrl);
    if (type === 'poll') {
      const opts = [...document.querySelectorAll('.poll-opt-input')].map(i => i.value.trim()).filter(Boolean);
      await Polls.create(post.id, opts);
    }
    closePostModal();
    UI.showToast('Post created!', 'success');
    // Reset form
    document.getElementById('post-title').value = '';
    document.getElementById('post-body').value  = '';
    document.getElementById('post-model-url').value = '';
    document.getElementById('post-schedule').value  = '';
    loadPosts();
  } catch(err) {
    alertEl.textContent = err.message;
    alertEl.classList.remove('hidden');
  } finally {
    UI.setLoading(btn, false);
  }
}

async function archivePost(id) {
  if (!confirm('Archive this post? Members will no longer see it.')) return;
  await Posts.archive(id);
  UI.showToast('Post archived.', 'info');
  loadPosts();
}

init();
</script>
</body>
</html>
